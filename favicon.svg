<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#g)"/>
  <text x="50" y="68" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif" font-size="55" text-anchor="middle">📅</text>
  <g>
    <circle cx="20" cy="20" r="3" fill="#fff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="20" r="3" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="80" r="3" fill="#fff" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="80" r="3" fill="#fff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="4" fill="#fff" opacity="0">
      <animate attributeName="r" values="0;25;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
